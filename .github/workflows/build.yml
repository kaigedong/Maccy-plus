name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build MaccyPlus
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project Maccy.xcodeproj \
            -scheme Maccy \
            -configuration Release \
            -derivedDataPath build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify Binary
        run: |
          APP="build/Build/Products/Release/Maccy.app"
          BINARY="$APP/Contents/MacOS/Maccy"

          echo "=== Binary Info ==="
          file "$BINARY"
          echo ""

          echo "=== Architecture ==="
          lipo -info "$BINARY" 2>/dev/null || echo "Single architecture binary"
          echo ""

          echo "=== Code Signature ==="
          codesign -dv "$APP" 2>&1 || true
          echo ""

          echo "=== Launch Test ==="
          # Remove quarantine if present
          xattr -cr "$APP" 2>/dev/null || true

          # Try to launch and check if it runs
          open "$APP"
          sleep 5

          # Check if Maccy process is running
          if pgrep -x "Maccy" > /dev/null; then
            echo "✅ Maccy launched successfully!"
            killall Maccy 2>/dev/null || true
          else
            echo "⚠️  Maccy process not found (may be expected for menu bar apps)"
            # For LSUIElement apps, the process name might differ
            ps aux | grep -i maccy | grep -v grep || echo "No Maccy process found"
          fi

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r Maccy.app.zip Maccy.app

      - name: Upload Artifact (latest)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: Maccy-latest
          path: build/Build/Products/Release/Maccy.app.zip

      - name: Upload to Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/Maccy.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release

on:
  push:
    branches:
      - master
      - feat/p2p-sync
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build MaccyPlus
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install xcodeproj gem
        run: gem install xcodeproj

      - name: Determine version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            BUILD_NUM="${{ github.run_number }}"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            VERSION="2.7.0-beta.${SHORT_SHA}"
            BUILD_NUM="${{ github.run_number }}"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_num=$BUILD_NUM" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust core
        run: |
          cargo build --release
          echo "=== Built libraries ==="
          ls -lh target/release/libmaccy_core.a target/release/libmaccy_sync.a

      - name: Generate UniFFI Swift bindings
        run: |
          cargo run --release --bin uniffi-bindgen --package maccy-core generate \
            --library target/release/libmaccy_core.dylib \
            --language swift \
            --out-dir Maccy/Generated
          echo "=== Generated Swift bindings ==="
          ls -lh Maccy/Generated/

      - name: Prepare UniFFI sources for Xcode
        run: |
          # Copy generated Swift binding into the Maccy target source tree
          cp Maccy/Generated/MaccyCore.swift Maccy/MaccyCore.swift
          # Create a modulemap that Xcode can find
          cat > Maccy/Generated/module.modulemap << 'EOF'
          module MaccyCore {
              header "MaccyCoreFFI.h"
              export *
          }
          EOF
          echo "=== Prepared UniFFI sources ==="
          ls -la Maccy/MaccyCore.swift Maccy/Generated/

      - name: Patch Xcode project to include MaccyCore
        run: |
          # Use ruby to add the generated Swift file and header search path to the Xcode project
          ruby -e '
            require "xcodeproj"

            project = Xcodeproj::Project.open("Maccy.xcodeproj")
            target = project.targets.find { |t| t.name == "Maccy" }
            abort "Target Maccy not found" unless target

            source_build_phase = target.source_build_phase

            # Add MaccyCore.swift if not already present
            unless source_build_phase.files.any? { |f| f.file_ref && f.file_ref.path == "MaccyCore.swift" }
              group = project.main_group.find_subpath("Maccy", true)
              file_ref = group.new_file("MaccyCore.swift")
              source_build_phase.add_file_reference(file_ref)
              puts "Added MaccyCore.swift to Maccy target"
            end

            # Add header search path for the module map
            config = target.build_configurations.first
            existing = config.build_settings["HEADER_SEARCH_PATHS"] || ["$(inherited)"]
            existing = [existing] unless existing.is_a?(Array)
            unless existing.include?("Maccy/Generated")
              existing << "Maccy/Generated"
              config.build_settings["HEADER_SEARCH_PATHS"] = existing
              puts "Added Maccy/Generated to HEADER_SEARCH_PATHS"
            end

            # Add library search path for Rust static lib
            existing_lib = config.build_settings["LIBRARY_SEARCH_PATHS"] || ["$(inherited)"]
            existing_lib = [existing_lib] unless existing_lib.is_a?(Array)
            rust_path = File.expand_path("target/release")
            unless existing_lib.include?(rust_path)
              existing_lib << rust_path
              config.build_settings["LIBRARY_SEARCH_PATHS"] = existing_lib
              puts "Added #{rust_path} to LIBRARY_SEARCH_PATHS"
            end

            project.save
            puts "Xcode project patched successfully"
          '

      - name: Build
        run: |
          xcodebuild build \
            -project Maccy.xcodeproj \
            -scheme Maccy \
            -configuration Release \
            -derivedDataPath build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_num }}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify Binary
        run: |
          APP="build/Build/Products/Release/Maccy.app"
          BINARY="$APP/Contents/MacOS/Maccy"

          echo "=== Binary Info ==="
          file "$BINARY"

          echo "=== Architecture ==="
          lipo -info "$BINARY" 2>/dev/null || echo "Single architecture binary"

          echo "=== Launch Test ==="
          xattr -cr "$APP" 2>/dev/null || true
          open "$APP"
          sleep 5
          if pgrep -x "Maccy" > /dev/null; then
            echo "✅ Maccy launched successfully!"
            killall Maccy 2>/dev/null || true
          else
            echo "⚠️ Maccy process not found (may be expected for menu bar apps)"
          fi

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r Maccy.app.zip Maccy.app

      # ── Beta: upload artifact + create/update pre-release ──
      - name: Upload Artifact (beta)
        if: steps.version.outputs.channel == 'beta'
        uses: actions/upload-artifact@v4
        with:
          name: Maccy-latest
          path: build/Build/Products/Release/Maccy.app.zip

      - name: Generate beta appcast
        if: steps.version.outputs.channel == 'beta'
        run: |
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          cat > appcast-beta.xml << APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>MaccyPlus Beta</title>
              <link>https://github.com/kaigedong/Maccy-plus/releases/download/latest-beta/appcast-beta.xml</link>
              <description>Most recent beta changes with links to updates.</description>
              <language>en</language>
              <item>
                <title>MaccyPlus ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build_num }})</title>
                <description><![CDATA[Beta build from latest master branch (${{ github.sha }}).]]></description>
                <pubDate>${DATE}</pubDate>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/kaigedong/Maccy-plus/releases/download/latest-beta/Maccy.app.zip"
                  sparkle:version="${{ steps.version.outputs.build_num }}"
                  sparkle:shortVersionString="${{ steps.version.outputs.version }}"
                  length="0"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          APPCAST

      - name: Publish Beta Release
        if: steps.version.outputs.channel == 'beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing latest-beta release + tag if present
          gh release delete latest-beta --yes --cleanup-tag 2>/dev/null || true

          # Create new pre-release
          gh release create latest-beta \
            build/Build/Products/Release/Maccy.app.zip \
            appcast-beta.xml \
            --title "MaccyPlus Beta (${{ steps.version.outputs.version }})" \
            --notes "Automated beta build from master (${{ github.sha }})." \
            --prerelease

      # ── Stable: create release on tag ──
      - name: Publish Stable Release
        if: steps.version.outputs.channel == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/Maccy.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

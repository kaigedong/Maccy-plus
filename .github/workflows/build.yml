name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build MaccyPlus
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # import certificate from secrets
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k $KEYCHAIN_PATH

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            $KEYCHAIN_PATH

          # use the keychain
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build
        run: |
          xcodebuild build \
            -project Maccy.xcodeproj \
            -scheme Maccy \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && 'Apple Development' || '-' }}" \
            CODE_SIGNING_REQUIRED=${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && 'YES' || 'NO' }} \
            CODE_SIGNING_ALLOWED=${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && 'YES' || 'NO' }} \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_DEVELOPER_TEAM_ID || '' }}"

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r Maccy.app.zip Maccy.app

      - name: Notarize
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
        run: |
          APP_PATH="build/Build/Products/Release/Maccy.app.zip"

          # submit for notarization
          xcrun notarytool submit "$APP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # staple the ticket
          xcrun stapler staple "build/Build/Products/Release/Maccy.app"

          # re-zip after stapling
          cd build/Build/Products/Release
          rm Maccy.app.zip
          zip -r Maccy.app.zip Maccy.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/Maccy.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/build_certificate.p12
